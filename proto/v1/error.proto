syntax = "proto3";

package droidmatch.v1;

option java_multiple_files = true;
option java_package = "app.droidmatch.proto.v1";

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_UNSUPPORTED_VERSION = 1;
  ERROR_CODE_UNSUPPORTED_CAPABILITY = 2;
  ERROR_CODE_UNAUTHORIZED = 3;
  ERROR_CODE_PERMISSION_REQUIRED = 4;
  ERROR_CODE_NOT_FOUND = 5;
  ERROR_CODE_ALREADY_EXISTS = 6;
  ERROR_CODE_INVALID_ARGUMENT = 7;
  ERROR_CODE_CANCELLED = 8;
  ERROR_CODE_TIMEOUT = 9;
  ERROR_CODE_TRANSPORT_LOST = 10;
  ERROR_CODE_CHECKSUM_MISMATCH = 11;
  ERROR_CODE_STORAGE_READ_ONLY = 12;
  ERROR_CODE_INTERNAL = 13;
}

message DroidMatchError {
  ErrorCode code = 1;
  string message = 2;
  string user_action = 3;
  map<string, string> details = 4;
}
