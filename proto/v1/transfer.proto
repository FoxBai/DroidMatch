syntax = "proto3";

package droidmatch.v1;

import "v1/error.proto";

option java_multiple_files = true;
option java_package = "app.droidmatch.proto.v1";

enum TransferDirection {
  TRANSFER_DIRECTION_UNSPECIFIED = 0;
  TRANSFER_DIRECTION_DOWNLOAD = 1;
  TRANSFER_DIRECTION_UPLOAD = 2;
}

enum TransferState {
  TRANSFER_STATE_UNSPECIFIED = 0;
  TRANSFER_STATE_QUEUED = 1;
  TRANSFER_STATE_RUNNING = 2;
  TRANSFER_STATE_PAUSED = 3;
  TRANSFER_STATE_CANCELLED = 4;
  TRANSFER_STATE_COMPLETED = 5;
  TRANSFER_STATE_FAILED = 6;
}

message TransferFingerprint {
  int64 size_bytes = 1;
  int64 modified_unix_millis = 2;
  string provider_etag = 3;
  string sha256 = 4;
}

message OpenTransferRequest {
  string transfer_id = 1;
  TransferDirection direction = 2;
  string source_path = 3;
  string destination_path = 4;
  int64 requested_offset_bytes = 5;
  int64 expected_size_bytes = 6;
  uint32 preferred_chunk_size_bytes = 7;
  TransferFingerprint source_fingerprint = 8;
}

message OpenTransferResponse {
  string transfer_id = 1;
  int64 accepted_offset_bytes = 2;
  uint32 chunk_size_bytes = 3;
  int64 total_size_bytes = 4;
  DroidMatchError error = 5;
  uint64 stream_id = 6;
  TransferFingerprint accepted_source_fingerprint = 7;
}

message TransferChunk {
  string transfer_id = 1;
  int64 offset_bytes = 2;
  bytes data = 3;
  uint32 crc32 = 4;
  bool final_chunk = 5;
}

message TransferChunkAck {
  string transfer_id = 1;
  int64 next_offset_bytes = 2;
  bool final_ack = 3;
  DroidMatchError error = 4;
}

message TransferProgress {
  string transfer_id = 1;
  TransferState state = 2;
  int64 transferred_bytes = 3;
  int64 total_bytes = 4;
  double bytes_per_second = 5;
  int64 resumable_offset_bytes = 6;
  DroidMatchError error = 7;
}

message PauseTransferRequest {
  string transfer_id = 1;
}

message PauseTransferResponse {
  string transfer_id = 1;
  bool ok = 2;
  int64 resumable_offset_bytes = 3;
  DroidMatchError error = 4;
}

message CancelTransferRequest {
  string transfer_id = 1;
  string reason = 2;
}

message CancelTransferResponse {
  string transfer_id = 1;
  bool ok = 2;
  DroidMatchError error = 3;
}
