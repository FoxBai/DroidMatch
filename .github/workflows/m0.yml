name: Spec and Skeleton Gates

on:
  push:
    branches:
      - main
      # A temporary owner-integration ref lets the exact candidate SHA earn
      # required checks before a non-forced main push. It is not a release ref.
      # 临时集成 ref 只用于同一 SHA 的推送前门禁，不是发布分支。
      - "codex/main-gate/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spec:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Check schema prerequisites
        run: bash tools/check-env.sh --proto
      - name: Check M0 gate
        run: bash tools/check-m0.sh
      - name: Check source-size debt ceilings
        run: python3 tools/check-source-size.py
      - name: Compile protobuf schemas
        run: bash tools/check-proto.sh
      - name: Check documentation links
        run: python3 tools/check-doc-links.py
      - name: Check redacted M1 run logs
        run: bash tools/check-m1-run-logs.sh
  mac-skeleton:
    runs-on: macos-26
    timeout-minutes: 30
    env:
      DROIDMATCH_SWIFT_SCRATCH_PATH: mac/.swiftpm-ci
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Show Swift toolchain
        id: swift-toolchain
        run: |
          # English: macos-26 is the supported arm64 runner with current Xcode 26
          # images. 中文：macos-26 是当前受支持的 arm64 runner，内置较新的 Xcode 26 镜像。
          xcode-select -p
          swift --version
          toolchain_key="$(swift --version | shasum -a 256 | awk '{print $1}')"
          echo "cache-key=${toolchain_key}" >> "${GITHUB_OUTPUT}"
      - name: Restore SwiftPM build cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: mac/.swiftpm-ci
          key: swiftpm-${{ runner.os }}-${{ runner.arch }}-${{ steps.swift-toolchain.outputs.cache-key }}-${{ hashFiles('mac/Package.resolved') }}
      - name: Check Swift prerequisites
        run: bash tools/check-env.sh --swift
      - name: Check product USB evidence with macOS system Bash
        run: |
          /bin/bash --version
          for script in \
            tools/product-usb-evidence-publication.sh \
            tools/run-product-usb-insertion-smoke.sh \
            tools/check-product-usb-insertion-logs.sh \
            tools/test-product-usb-insertion-smoke.sh \
            tools/test-product-usb-insertion-logs.sh; do
            /bin/bash -n "${script}"
          done
          /bin/bash tools/test-product-usb-insertion-smoke.sh
          /bin/bash tools/test-product-usb-insertion-logs.sh
          /bin/bash tools/check-product-usb-insertion-logs.sh
      - name: Check Swift harness
        run: bash tools/run-swift-tests.sh
      - name: Assemble local macOS app bundle
        run: tools/build-mac-app.sh --configuration release --output mac/.build/ci/DroidMatch.app
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
      - name: Install adb for sandbox bundle verification
        run: sdkmanager "platform-tools"
      - name: Assemble sandboxed macOS product bundle
        run: tools/build-mac-app.sh --configuration release --sandboxed --output mac/.build/ci-sandbox/DroidMatch.app
      - name: Package and mount-verify local macOS DMG
        run: tools/build-mac-dmg.sh --sandboxed --app mac/.build/ci-sandbox/DroidMatch.app --output mac/.build/ci-sandbox/DroidMatch.dmg
  android-skeleton:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Check Android prerequisites
        run: bash tools/check-env.sh --android
      - name: Check Android service skeleton
        run: DROIDMATCH_SKIP_SWIFT=1 DROIDMATCH_REQUIRE_GRADLE=1 bash tools/check-m1-skeleton.sh
