name: Spec and Skeleton Gates

on:
  push:
  pull_request:

jobs:
  spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Check M0 gate
        run: bash tools/check-m0.sh
      - name: Compile protobuf schemas
        run: bash tools/check-proto.sh
  mac-skeleton:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Check Swift harness
        run: swift test --package-path mac
