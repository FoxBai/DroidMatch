name: Spec and Skeleton Gates

on:
  push:
  pull_request:

jobs:
  spec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Check M0 gate
        run: bash tools/check-m0.sh
      - name: Compile protobuf schemas
        run: bash tools/check-proto.sh
  mac-skeleton:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Check Swift harness
        run: swift test --package-path mac
  android-skeleton:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v4
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Android platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Check Android service skeleton
        run: DROIDMATCH_SKIP_SWIFT=1 DROIDMATCH_REQUIRE_GRADLE=1 bash tools/check-m1-skeleton.sh
